name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip autoconf automake libtool libtool-bin \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev autoconf-archive libltdl-dev
          pip3 install --user --upgrade buildozer Cython==3.0.10

      - name: Patch and Update Autotools
        run: |
          # Voer autoupdate uit op alle configuratiebestanden die we kunnen vinden
          find . -name configure.ac -execdir autoupdate \;
          # Forceer de macro herkenning voor libtool
          find . -name configure.ac -exec sed -i '/^AC_INIT/a m4_pattern_allow([LT_SYS_SYMBOL_USCORE])' {} \;

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Buildozer opschonen en build starten
          buildozer android clean
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-APK
          path: bin/*.apk
