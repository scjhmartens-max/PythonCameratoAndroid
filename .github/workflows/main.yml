name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip autoconf automake libtool libtool-bin \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev autoconf-archive libltdl-dev
          pip3 install --user --upgrade buildozer Cython==3.0.10

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # Fix: Zorg dat de map bestaat om de FileNotFoundError te voorkomen
          mkdir -p .buildozer/android/platform/python-for-android
          
          # Fix: Pas de deprecated 'android.sdk' aan naar 'android.api' in buildozer.spec
          sed -i 's/android.sdk =/android.api =/g' buildozer.spec
          
          # Start de build (we slaan 'clean' over omdat de GitHub runner al leeg is)
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-APK
          path: bin/*.apk
