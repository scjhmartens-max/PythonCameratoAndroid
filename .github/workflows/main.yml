name: Build Camera App
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04  # Stabielere versie voor Buildozer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy  # Specifieke stabiele versies

      - name: Build with Buildozer
        run: |
          # We maken de map handmatig aan voor de zekerheid
          mkdir -p .buildozer/android/platform/python-for-android
          # Buildozer uitvoeren
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp
          path: bin/*.apk
