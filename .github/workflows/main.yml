- name: Install system dependencies
  run: |
    sudo apt-get update
    sudo apt-get install -y \
      git zip unzip openjdk-17-jdk python3-pip \
      autoconf libtool pkg-config zlib1g-dev \
      libncurses5-dev libncursesw5-dev libtinfo6 \
      cmake libffi-dev libssl-dev \
      automake autoconf-archive libltdl-dev
    pip3 install --user --upgrade buildozer Cython==3.0.10

- name: Patch configure.ac for missing macro
  run: |
    find . -name configure.ac -exec \
      sed -i '/^AC_INIT/a m4_pattern_allow([LT_SYS_SYMBOL_USCORE])' {} \;

- name: Run autoupdate on all configure.ac found
  run: |
    find . -name configure.ac -execdir autoupdate \;

- name: Build with Buildozer
  run: |
    export PATH=$PATH:$HOME/.local/bin
    yes | buildozer android debug
