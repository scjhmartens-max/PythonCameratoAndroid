name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buildozer Action
        uses: Android-for-Python/android-release-action@v1
        with:
          buildozer_config: buildozer.spec
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-APK
          path: bin/*.apk
