name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer Cython==3.0.10

      # The problematic Fix autoconf macros step has been removed

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Force 'yes' on all SDK licenses and start build
          yes | buildozer android debug
        
      - name: Upload APK
        # Buildozer usually puts the apk in the 'bin' directory
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-APK
          path: bin/*.apk
